name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required files
        run: |
          test -f index.html
          test -f style.css
          test -f game.js

      - name: JavaScript syntax check
        run: node --check game.js
