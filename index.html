<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bryan's Bonkers Cruise Dash</title>
  <meta name="description" content="Bryan's Bonkers Cruise Dash: jump walls, collect drinks, and zoom across the deck.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bryan's Bonkers Cruise Dash">
  <meta property="og:description" content="Jump walls, collect drinks, and run faster.">
  <meta property="og:image" content="assets/images/characters/bryan.png">
  <meta property="og:image:alt" content="Bryan character from Bryan's Bonkers Cruise Dash">
  <meta property="og:image:width" content="677">
  <meta property="og:image:height" content="846">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bryan's Bonkers Cruise Dash">
  <meta name="twitter:description" content="Jump walls, collect drinks, and run faster.">
  <meta name="twitter:image" content="assets/images/characters/bryan.png">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" aria-label="Side-scrolling runner game"></canvas>
    <section id="splashScreen" class="splash-screen" aria-label="Opening splash screen">
      <div class="splash-card">
        <div class="splash-art-frame" aria-hidden="true">
          <img
            class="splash-image"
            src="assets/images/ui/bryan-splash.png"
            alt="Bryan splash artwork"
            draggable="false"
          >
        </div>
        <button id="splashContinueButton" class="splash-continue" type="button">Press Start</button>
      </div>
    </section>
    <section class="hud" aria-live="polite">
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span id="scoreValue" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Speed</span>
        <span id="speedValue" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Level</span>
        <span id="levelValue" class="hud-value">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Next</span>
        <span id="nextLevelValue" class="hud-value">8 pts to L2</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Lives</span>
        <span id="livesValue" class="hud-value">3</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Combo</span>
        <span id="comboValue" class="hud-value">x1.0</span>
      </div>
    </section>
    <section class="overlay" id="overlay">
      <div class="overlay-card">
        <div class="overlay-heading">
          <p class="start-marquee">Press Start</p>
          <h1 class="title">Bryan's Bonkers Cruise Dash</h1>
          <p class="subtitle">Tap, click, or press Space / Arrow Up to jump.</p>
        </div>
        <section class="menu-panels">
          <div class="menu-panel menu-panel-setup">
            <div class="character-picker">
              <label for="characterSelect">Runner</label>
              <select id="characterSelect">
                <option value="bryan">Bryan + Pill</option>
                <option value="barbra">Barbra + Morning Beer</option>
                <option value="kyle">Kyle + Champagne</option>
              </select>
              <p id="characterDetails" class="character-details"></p>
            </div>
            <div class="start-level-picker">
              <label for="startLevelSelect">Start Level</label>
              <select id="startLevelSelect">
                <option value="1">Level 1 - Existing Cruise Deck</option>
              </select>
              <p id="startLevelDetails" class="start-level-details"></p>
            </div>
            <div class="accessibility-options">
              <label for="controlSchemeSelect">Controls</label>
              <select id="controlSchemeSelect">
                <option value="right">Space / W / ↑ / ↓</option>
                <option value="left">Space / W / ↑ / ←</option>
              </select>
              <label for="speedScaleSelect">Game Speed</label>
              <select id="speedScaleSelect">
                <option value="0.85">Relaxed (85%)</option>
                <option value="1" selected>Normal (100%)</option>
                <option value="1.15">Fast (115%)</option>
              </select>
              <label class="checkbox-row" for="contrastToggle">
                <input id="contrastToggle" type="checkbox">
                High Contrast HUD
              </label>
              <label class="checkbox-row" for="audioToggle">
                <input id="audioToggle" type="checkbox" checked>
                Audio Enabled
              </label>
            </div>
            <button
              id="helpButton"
              class="menu-help"
              type="button"
              aria-haspopup="dialog"
              aria-controls="notesDialog"
            >
              Help
            </button>
          </div>
        </section>
        <div class="overlay-actions">
          <button id="actionButton" type="button">Start Run</button>
          <a id="shareLink" class="share-link hidden" href="#" target="_blank" rel="noopener">
            Share Score
          </a>
        </div>
      </div>
    </section>
    <section
      id="notesDialog"
      class="notes-dialog hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="notesTitle"
      aria-describedby="notesIntro"
    >
      <div class="notes-card">
        <h2 id="notesTitle">Release Notes</h2>
        <p id="notesIntro" class="notes-intro"></p>
        <div id="notesScrollRegion" class="notes-scroll" tabindex="0" aria-label="Release notes list"></div>
        <div class="notes-actions">
          <button id="notesCloseButton" type="button">Close</button>
        </div>
      </div>
    </section>
    <p class="touch-hint" aria-hidden="true">Tap anywhere to jump</p>
  </main>
  <script type="module" src="src/game.js"></script>
</body>
</html>
